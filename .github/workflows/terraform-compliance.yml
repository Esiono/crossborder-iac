# =============================================================================
# .github/workflows/terraform-compliance.yml
# Runs Terraform plan + OPA policy checks on every pull request.
#
# Enforcement model:
#   - lint: terraform fmt/validate + tflint, fails fast before any plan
#   - OPA via Conftest: catches violations in PR before merge
#   - Azure Policy: catches drift at runtime (separate layer)
#
# This workflow implements the CI half of the defense-in-depth strategy.
#
# Actions are pinned to commit SHAs (not tags) for supply-chain integrity —
# the trailing comment records which release tag the SHA corresponds to.
# =============================================================================

name: Terraform Compliance

on:
  pull_request:
    branches:
      - main
    paths:
      - 'environments/**'
      - 'modules/**'
      - 'policies/**'

jobs:
  lint:
    name: Lint — fmt, validate, tflint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          for env in environments/mx-central environments/us-east2; do
            echo "Validating $env"
            terraform -chdir="$env" init -backend=false -input=false
            terraform -chdir="$env" validate
          done

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e87008f9dd1fe3e34e66aca6c97b4a69f72a7f4 # v4
        with:
          tflint_version: v0.63.1

      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --recursive

  compliance-mx-central:
    name: OPA Compliance — mx-central
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.8"

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          rm conftest_0.56.0_Linux_x86_64.tar.gz

      - name: Terraform Init — mx-central
        working-directory: environments/mx-central
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: terraform init

      - name: Terraform Plan — mx-central
        working-directory: environments/mx-central
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: |
          terraform plan -out=tfplan.binary
          terraform show -json tfplan.binary > tfplan.json

      - name: OPA Policy Check — mx-central
        working-directory: environments/mx-central
        run: |
          conftest test tfplan.json \
            --policy ../../policies/ \
            --namespace crossborder.storage

  compliance-us-east2:
    name: OPA Compliance — us-east2
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.8"

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          rm conftest_0.56.0_Linux_x86_64.tar.gz

      - name: Terraform Init — us-east2
        working-directory: environments/us-east2
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: terraform init

      - name: Terraform Plan — us-east2
        working-directory: environments/us-east2
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: |
          terraform plan -out=tfplan.binary
          terraform show -json tfplan.binary > tfplan.json

      - name: OPA Policy Check — us-east2
        working-directory: environments/us-east2
        run: |
          conftest test tfplan.json \
            --policy ../../policies/ \
            --namespace crossborder.storage

  checkov-scan:
    name: Checkov Static Analysis
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Checkov
        run: pip install checkov==3.3.2 # Pinned for reproducibility; update periodically

      - name: Run Checkov
        run: |
          ARGS=(-d . --framework terraform --compact)
          ARGS+=(--skip-check CKV_AZURE_33)    # Storage Queue service logging — Queue Storage isn't used in this reference implementation
          ARGS+=(--skip-check CKV2_AZURE_1)    # Storage customer-managed key encryption — uses Microsoft-managed keys; CMK is out of scope for reference implementation
          ARGS+=(--skip-check CKV2_AZURE_18)   # Storage customer-managed key encryption (duplicate of CKV2_AZURE_1) — same rationale, CMK out of scope
          ARGS+=(--skip-check CKV2_AZURE_21)   # Storage Blob service read-request logging — not configured; diagnostics handled via observability-baseline module instead
          ARGS+=(--skip-check CKV_AZURE_206)   # Geo-replication prohibited by LFPDPPP Art. 36 — LRS-only is a legal requirement
          ARGS+=(--skip-check CKV2_AZURE_32)   # Private endpoint for Key Vault — out of scope for reference implementation
          ARGS+=(--skip-check CKV2_AZURE_33)   # Private endpoint for Storage — out of scope for reference implementation
          ARGS+=(--skip-check CKV2_AZURE_41)   # SAS expiration policy — not configurable via Terraform HCL
          checkov "${ARGS[@]}"
