repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.108.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint

  - repo: https://github.com/open-policy-agent/conftest
    rev: v0.68.2
    hooks:
      - id: conftest-test
        files: ^tests/fixtures/.*\.json$
        args: [--policy, policies/, --namespace, crossborder.storage]
